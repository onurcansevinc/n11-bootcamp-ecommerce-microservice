name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - develop
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Make Maven Wrapper Executable
        run: chmod +x mvnw

      - name: Run Maven Test Suite
        run: ./mvnw test

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: storefront/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: storefront
        run: npm ci

      - name: Build Frontend
        working-directory: storefront
        run: npm run build

  compose-config:
    name: Docker Compose Config
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker Compose Configuration
        run: docker compose --env-file .env.production.example -f docker-compose.yml -f docker-compose.apps.yml config

  jib-smoke:
    name: Jib Smoke Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Make Maven Wrapper Executable
        run: chmod +x mvnw

      - name: Build Product Service Jib Tarball
        run: ./mvnw -pl product-service -am -Dmaven.test.skip=true package com.google.cloud.tools:jib-maven-plugin:3.4.6:buildTar

      - name: Verify Jib Tarball
        run: test -f product-service/target/jib-image.tar
