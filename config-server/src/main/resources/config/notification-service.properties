server.port=${NOTIFICATION_SERVICE_PORT:8768}

spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:ecommerce-microservice}
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD}

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.listener.simple.default-requeue-rejected=false
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.max-attempts=${NOTIFICATION_PAYMENT_EVENT_MAX_ATTEMPTS:3}
spring.rabbitmq.listener.simple.retry.initial-interval=${NOTIFICATION_PAYMENT_EVENT_RETRY_INITIAL_INTERVAL_MS:1000}
spring.rabbitmq.listener.simple.retry.multiplier=2
spring.rabbitmq.listener.simple.retry.max-interval=${NOTIFICATION_PAYMENT_EVENT_RETRY_MAX_INTERVAL_MS:10000}

spring.flyway.baseline-on-migrate=true
spring.flyway.default-schema=notifications
spring.flyway.schemas=notifications
spring.flyway.create-schemas=true

spring.jpa.properties.hibernate.default_schema=notifications
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.mail.host=${SMTP_HOST:localhost}
spring.mail.port=${SMTP_PORT:1025}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS_ENABLE:false}

notification.mail.from=${NOTIFICATION_MAIL_FROM:no-reply@n11-bootcamp.local}
notification.payment.events.exchange=${PAYMENT_EVENTS_EXCHANGE:payment.events}
notification.payment.events.dlx=${PAYMENT_EVENTS_DLX:payment.events.dlx}
notification.payment.events.queue=${NOTIFICATION_PAYMENT_EVENTS_QUEUE:notification.payment-events.v1}
notification.payment.events.dlq=${NOTIFICATION_PAYMENT_EVENTS_DLQ:notification.payment-events.dlq.v1}
notification.netgsm.endpoint=${NETGSM_SMS_ENDPOINT:https://api.netgsm.com.tr/sms/send/get/}
notification.netgsm.user-code=${NETGSM_USER_CODE:}
notification.netgsm.password=${NETGSM_PASSWORD:}
notification.netgsm.msg-header=${NETGSM_MSG_HEADER:TEST}
