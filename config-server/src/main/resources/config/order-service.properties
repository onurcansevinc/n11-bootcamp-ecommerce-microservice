server.port=${ORDER_SERVICE_PORT:8766}

spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:ecommerce-microservice}
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD}

spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/ecommerce}
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.listener.simple.default-requeue-rejected=false
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.max-attempts=${ORDER_PAYMENT_EVENT_MAX_ATTEMPTS:3}
spring.rabbitmq.listener.simple.retry.initial-interval=${ORDER_PAYMENT_EVENT_RETRY_INITIAL_INTERVAL_MS:1000}
spring.rabbitmq.listener.simple.retry.multiplier=2
spring.rabbitmq.listener.simple.retry.max-interval=${ORDER_PAYMENT_EVENT_RETRY_MAX_INTERVAL_MS:10000}

spring.flyway.baseline-on-migrate=true
spring.flyway.default-schema=ordering
spring.flyway.schemas=ordering
spring.flyway.create-schemas=true

spring.jpa.properties.hibernate.default_schema=ordering
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

clients.cart-service.base-url=${CART_SERVICE_BASE_URL:http://cart-service}
clients.inventory-service.base-url=${INVENTORY_SERVICE_BASE_URL:http://inventory-service}
clients.internal-auth.token-url=${KEYCLOAK_TOKEN_URI:http://localhost:8080/realms/ecommerce/protocol/openid-connect/token}
clients.internal-auth.client-id=${INTERNAL_SERVICE_CLIENT_ID:service-internal}
clients.internal-auth.client-secret=${INTERNAL_SERVICE_CLIENT_SECRET:change-me-service-client-secret}
order.payment.events.exchange=${PAYMENT_EVENTS_EXCHANGE:payment.events}
order.payment.events.dlx=${PAYMENT_EVENTS_DLX:payment.events.dlx}
order.payment.events.queue=${ORDER_PAYMENT_EVENTS_QUEUE:order.payment-events.v1}
order.payment.events.dlq=${ORDER_PAYMENT_EVENTS_DLQ:order.payment-events.dlq.v1}
