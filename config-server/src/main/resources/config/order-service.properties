server.port=${ORDER_SERVICE_PORT:8766}

spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:ecommerce-microservice}
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD}

spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/ecommerce}

spring.flyway.baseline-on-migrate=true
spring.flyway.default-schema=ordering
spring.flyway.schemas=ordering
spring.flyway.create-schemas=true

spring.jpa.properties.hibernate.default_schema=ordering
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

clients.cart-service.base-url=${CART_SERVICE_BASE_URL:http://cart-service}
clients.inventory-service.base-url=${INVENTORY_SERVICE_BASE_URL:http://inventory-service}
