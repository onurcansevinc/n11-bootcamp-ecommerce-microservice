server.port=${PAYMENT_SERVICE_PORT:8767}

spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:ecommerce-microservice}
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD}

spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/ecommerce}
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

spring.flyway.baseline-on-migrate=true
spring.flyway.default-schema=payments
spring.flyway.schemas=payments
spring.flyway.create-schemas=true

spring.jpa.properties.hibernate.default_schema=payments
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

clients.order-service.base-url=${ORDER_SERVICE_BASE_URL:http://order-service}
clients.internal-auth.token-url=${KEYCLOAK_TOKEN_URI:http://localhost:8080/realms/ecommerce/protocol/openid-connect/token}
clients.internal-auth.client-id=${INTERNAL_SERVICE_CLIENT_ID:service-internal}
clients.internal-auth.client-secret=${INTERNAL_SERVICE_CLIENT_SECRET:change-me-service-client-secret}

payment.iyzico.api-key=${IYZICO_API_KEY:sandbox-api-key}
payment.iyzico.secret-key=${IYZICO_SECRET_KEY:sandbox-secret-key}
payment.iyzico.base-url=${IYZICO_BASE_URL:https://sandbox-api.iyzipay.com}
payment.iyzico.callback-url=${IYZICO_CALLBACK_URL:http://localhost:8767/api/v1/payments/iyzico/callback}
payment.frontend-result-url=${PAYMENT_RESULT_URL:http://localhost:5173/payment/result}
payment.events.exchange=${PAYMENT_EVENTS_EXCHANGE:payment.events}
payment.outbox.publish.fixed-delay=${PAYMENT_OUTBOX_PUBLISH_DELAY_MS:5000}
payment.outbox.publish.batch-size=${PAYMENT_OUTBOX_BATCH_SIZE:50}
