services:
  postgres:
    image: postgres:16-alpine
    container_name: ecommerce-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ecommerce-microservice}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${HOST_BIND_IP:-0.0.0.0}:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ecommerce-microservice}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - ecommerce-network

  redis:
    image: redis:7-alpine
    container_name: ecommerce-redis
    restart: unless-stopped
    ports:
      - "${HOST_BIND_IP:-0.0.0.0}:${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    volumes:
      - redis-data:/data
    networks:
      - ecommerce-network

  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    container_name: ecommerce-keycloak
    restart: unless-stopped
    command: start-dev --http-port=8080 --import-realm
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HEALTH_ENABLED: "true"
    ports:
      - "${HOST_BIND_IP:-0.0.0.0}:${KEYCLOAK_PORT:-8080}:8080"
    volumes:
      - ./keycloak/import:/opt/keycloak/data/import:ro
    networks:
      - ecommerce-network

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: ecommerce-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "${HOST_BIND_IP:-0.0.0.0}:${RABBITMQ_PORT:-5672}:5672"
      - "${HOST_BIND_IP:-0.0.0.0}:${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - ecommerce-network

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: ecommerce-mailhog
    restart: unless-stopped
    ports:
      - "${HOST_BIND_IP:-0.0.0.0}:${MAILHOG_SMTP_PORT:-1025}:1025"
      - "${HOST_BIND_IP:-0.0.0.0}:${MAILHOG_UI_PORT:-8025}:8025"
    networks:
      - ecommerce-network

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:

networks:
  ecommerce-network:
    driver: bridge
